# Docker Compose for PersonaBot
# This orchestrates both the frontend and backend services

version: '3.8'

services:
  backend:
    build: ./backend
    container_name: personabot-api
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - CELERY_BROKER_URL=amqp://guest:guest@rabbitmq:5672//
    depends_on:
      - rabbitmq
    restart: always

  rabbitmq:
    image: rabbitmq:3-management
    container_name: personabot-broker
    ports:
      - "5672:5672"   # AMQP
      - "15672:15672" # Management Plugin UI
    restart: always

  celery_worker:
    build: ./celery_worker
    container_name: personabot-worker
    env_file:
      - ./backend/.env
    environment:
      - CELERY_BROKER_URL=amqp://guest:guest@rabbitmq:5672//
    depends_on:
      - rabbitmq
    restart: always

  frontend:
    build:
      context: ./frontend
      args:
        - NEXT_PUBLIC_SUPABASE_URL=${SUPABASE_URL}
        - NEXT_PUBLIC_SUPABASE_ANON_KEY=${SUPABASE_KEY}
        - NEXT_PUBLIC_API_URL=http://localhost:8000/api
    container_name: personabot-web
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_SUPABASE_URL=${SUPABASE_URL}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${SUPABASE_KEY}
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api
    depends_on:
      - backend
    restart: always


