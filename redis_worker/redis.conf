# Production Redis config for PersonaBot
# Optimized for 100MB ceiling on Render/EC2 free tier

# Bind to all interfaces inside the container
bind 0.0.0.0
protected-mode no

# Memory: cap at 100MB, evict oldest keys when full (LRU)
maxmemory 100mb
maxmemory-policy allkeys-lru

# Disable AOF persistence on Render (ephemeral filesystem)
# Data is only used for caching/rate-limiting — loss on restart is acceptable
appendonly no
save ""

# Logging: write to stdout for Docker log capture
loglevel notice
logfile ""
