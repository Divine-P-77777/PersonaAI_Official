# Basic production tuning for 1GB RAM environment
# Allow RabbitMQ to use up to 40% of the host RAM (max 400MB on 1GB EC2)
vm_memory_high_watermark.relative = 0.4
# Stop accepting messages if disk space drops below 10%
disk_free_limit.relative = 0.1

# Management HTTP settings
management.tcp.port = 15672

# Declarative setup: Load users, vhosts, and permissions on startup
load_definitions = /etc/rabbitmq/definitions.json

# Logging: Stream to console for Docker
log.console = true
log.console.level = info